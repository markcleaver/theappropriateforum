<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — The Appropriate Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --off-black: #1a1a18;
    --warm-white: #f5f0e8;
    --terracotta: #c4704b;
    --teal: #2a7c7f;
    --text: #d4cfc4;
    --text-muted: #8a857a;
  }

  body {
    background: var(--off-black);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-weight: 700;
    font-size: clamp(26px, 5vw, 44px);
    color: var(--warm-white);
    margin-bottom: 16px;
    letter-spacing: 3px;
  }

  p {
    font-size: 19px;
    color: var(--teal);
    font-style: italic;
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 32px;
  }

  a {
    color: var(--terracotta);
    text-decoration: none;
    font-size: 17px;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(196,112,75,0.3);
    transition: border-color 0.3s;
  }

  a:hover {
    border-color: var(--terracotta);
  }
</style>
</head>
<body>
  <h1>Thank You</h1>
  <p>We'll be in touch — regrettably, probably soon.</p>
  <a href="/">← Back to The Appropriate Forum</a>
</body>
</html>
